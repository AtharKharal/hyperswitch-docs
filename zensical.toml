# Zensical Configuration

[project]
site_name = "Hyperswitch"
site_url = "https://hyperswitch.io/docs"
site_description = "Hyperswitch - Open Source Payment Orchestration Platform API Documentation"
docs_dir = "docs"
site_dir = "site"
extra_css = ["stylesheets/extra.css"]
extra_javascripts = ["javascripts/api-playground.js"]

[project.theme]
variant = "modern"

[[project.theme.palette]]
scheme = "slate"
primary = "deep_purple"
accent = "cyan"
toggle = { icon = "material/weather-night", name = "Switch to light mode" }

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "deep_purple"
accent = "cyan"
toggle = { icon = "material/weather-sunny", name = "Switch to dark mode" }

[project.extra]
generator = "Zensical"

